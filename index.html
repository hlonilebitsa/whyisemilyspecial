<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Why Is Emily Special?</title>

    <!-- Google Font for a romantic/book feel -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffd6e0; /* soft light pink */
            font-family: 'Playfair Display', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .cover-container {
            background: rgba(255, 255, 255, 0.6);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #5a2a2a;
        }

        .subtitle {
            font-family: 'Dancing Script', cursive;
            font-size: 1.4rem;
            color: #7a3e3e;
            margin-bottom: 30px;
        }

        img {
            width: 75%;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .start-btn {
            display: inline-block;
            padding: 12px 25px;
            background-color: #ff8fa3;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 1rem;
            transition: 0.3s;
        }

        .start-btn:hover {
            background-color: #ff6f91;
        }
    </style>
</head>
<body>

    <div class="cover-container">

        <h1>Why Is Emily Special?</h1>

        <div class="subtitle">
            A short story book about Emily, a dime. 
        </div>

        <!-- 📸 ADD YOUR IMAGE HERE -->
        <!-- Replace "your-image.jpg" with your actual image file -->
        <img src="Images/cover.png" alt="Emily">

        <!-- Button to go to next page -->
        <a href="author.html" class="start-btn">Start Reading</a>

    </div>

</body>
</html>
