<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easter Egg 4</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* 🖼️ FULL SCREEN IMAGE */
        .full-image {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 🌙 soft overlay (optional cinematic feel) */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.15);
        }

        /* 🔙 BACK BUTTON */
        .back-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 22px;
            background-color: rgba(255, 143, 163, 0.9);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
            z-index: 10;
        }

        .back-btn:hover {
            background-color: rgba(255, 111, 145, 0.95);
        }
    </style>
</head>

<body>

    <!-- 🖼️ FULL SCREEN IMAGE -->
    <img src="Images/waro.jpg" class="full-image" alt="Easter Egg 4">

    <!-- 🌙 overlay -->
    <div class="overlay"></div>

    <!-- 🔙 BACK BUTTON -->
    <a href="page4.html" class="back-btn">Back to Story</a>

</body>
</html>
