<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The End</title>

    <!-- 🌹 Romantic fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            background: black;
        }

        /* 🖼️ FULL SCREEN IMAGE */
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background-color: black;
        }

        /* 🌹 THE END TEXT */
        .end-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Great Vibes', cursive;
            font-size: 3.2rem;
            color: white;
            text-shadow: 0 5px 15px rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .end-text span {
            color: #ff4d6d; /* red heart */
            font-size: 2.2rem;
        }

        /* 🔙 BACK BUTTON */
        .back {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background-color: rgba(255, 143, 163, 0.95);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
            font-family: 'Playfair Display', serif;
        }

        .back:hover {
            background-color: rgba(255, 111, 145, 1);
        }
    </style>
</head>

<body>

    <!-- 🖼️ BACKGROUND IMAGE -->
    <img src="Images/author.jpg" class="bg" alt="Background">

    <!-- 🌹 THE END + HEART -->
    <div class="end-text">
        The End <span>♥</span>
    </div>

    <!-- 🔙 BACK BUTTON -->
    <a href="page4.html" class="back">Back</a>

</body>
</html>
