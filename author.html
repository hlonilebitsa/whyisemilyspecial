<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Author</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;

            /* 🌄 BACKGROUND IMAGE */
            background: url('Images/author1.jpg') no-repeat center center/cover;

            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Playfair Display', serif;
        }

        .author-box {
            background-color: rgba(255, 214, 224, 0.9); /* light pink box */
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .author-title {
            font-size: 1.2rem;
            color: #7a3e3e;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .author-name {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: #5a2a2a;
        }

        .continue-btn {
            margin-top: 25px;
            display: inline-block;
            padding: 10px 20px;
            background-color: #ff8fa3;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .continue-btn:hover {
            background-color: #ff6f91;
        }
    </style>
</head>
<body>

    <div class="author-box">
        <div class="author-title">Author</div>
        <div class="author-name">Hlonolofatso Lebitsa</div>

        <!-- Optional: button to go to Chapter 1 later -->
        <a href="page1.html" class="continue-btn">Continue</a>
    </div>

</body>
</html>
